version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: phoenix-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: phoenix_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
