<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <defs>
    <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="40%" stop-color="#ff9500" />
      <stop offset="80%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#af52de" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Stylized phoenix wings and tail -->
  <!-- Wing Left -->
  <path d="M 50 70 C 25 70 8 50 12 25 C 15 12 25 15 30 20 C 28 30 35 42 50 45 Z" fill="url(#phoenixGrad)" />
  <!-- Wing Right -->
  <path d="M 50 70 C 75 70 92 50 88 25 C 85 12 75 15 70 20 C 72 30 65 42 50 45 Z" fill="url(#phoenixGrad)" />
  <!-- Tail feathers -->
  <path d="M 50 70 C 45 82 38 94 50 98 C 62 94 55 82 50 70 Z" fill="url(#phoenixGrad)" />
  <path d="M 50 70 C 48 76 43 83 40 87 C 45 85 47 78 50 70" fill="#ff9500" />
  <path d="M 50 70 C 52 76 57 83 60 87 C 55 85 53 78 50 70" fill="#ff9500" />
  <!-- Body and Head -->
  <path d="M 50 15 C 47 22 45 32 47 42 C 49 52 51 62 50 70 C 49 62 51 52 53 42 C 55 32 53 22 50 15 Z" fill="url(#phoenixGrad)" filter="url(#glow)" />
  <!-- Head feather / Crest -->
  <path d="M 50 15 C 48 8 42 3 50 0 C 52 8 50 12 50 15 Z" fill="#ffcc00" />
  <!-- Beak -->
  <path d="M 50 15 L 52 19 L 48 19 Z" fill="#ffcc00" />
</svg>